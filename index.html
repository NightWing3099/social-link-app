<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <!-- Tailwind CSS: this is the generated stylesheet (from npm run build) -->
        <link rel="stylesheet" href="src/input.css"/>

        <!-- Tailwind CSS Play CDN: loads Tailwind instantly, no build step.
             This is just for quick previewing while you learn.
             Later, remove this line and rely on the local build above. -->
        <script src="https://cdn.tailwindcss.com"></script>


        <title>Frontend Mentor | Social links profile</title>
    </head>
    <body>
        <div class="flex flex-col items-center justify-center min-h-screen bg-gray-100 p-4">
            <div class="card bg-white rounded-xl h-100 shadow-lg p-6 max-w-md w-full">
                <div class="flex flex-col items-center">
                    <img
                        src="./assets/images/avatar-jessica.jpeg"
                        alt="Jessica Randall"
                        class="w-24 h-24 rounded-full border-4 border-blue-500 mb-4"
                    />
                    <h1 class="card-title text-2xl font-bold text-gray-800">Jessica Randall</h1>
                    <p class="text-gray-600">London, United Kingdom</p>
                    <p class="text-gray-500 text-center mt-2">
                        "Front-end developer and avid reader."
                    </p>
                </div>

                <div class="flex flex-wrap flex-col justify-center gap-4 mt-6">
                    <a
                        href="https://github.com/"
                        class="card-btn bg-blue-500 hover:bg-blue-600 text-center text-white font-medium py-3 px-4 rounded-md transition duration-300"
                    >
                        GitHub
                    </a>
                    <a
                        href="https://www.frontendmentor.io/"
                        class="card-btn bg-blue-500 hover:bg-blue-600 text-center text-white font-medium py-3 px-4 rounded-md transition duration-300"
                    >
                        Frontend Mentor
                    </a>
                    <a
                        href="https://www.linkedin.com/"
                        class="card-btn bg-blue-500 hover:bg-blue-600 text-center text-white font-medium py-3 px-4 rounded-md transition duration-300"
                    >
                        LinkedIn
                    </a>
                    <a
                        href="https://x.com/"
                        class="card-btn bg-blue-500 hover:bg-blue-600 text-center text-white font-medium py-3 px-4 rounded-md transition duration-300"
                    >
                        Twitter
                    </a>
                    <a
                        href="https://www.instagram.com/?hl=en"
                        class="card-btn bg-blue-500 hover:bg-blue-600 text-center text-white font-medium py-3 px-4 rounded-md transition duration-300"
                    >
                        Instagram
                    </a>
                </div>
            </div>
        </div>

        <footer class="flex justify-center items-center mt-2 text-gray-500 text-sm">
            Challenge by
            <a href="https://www.frontendmentor.io?ref=challenge"
                >Frontend Mentor</a
            >. Coded by <a href="#">Iree Hale</a>.
        </footer>
    </body>
</html>
